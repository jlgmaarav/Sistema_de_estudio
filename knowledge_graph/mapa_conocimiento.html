* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--ink); font-family: system-ui, "Segoe UI", sans-serif; }
.top {
  display: flex; flex-wrap: wrap; gap: 10px 18px; align-items: baseline;
  padding: 14px 18px 10px;
}
h1 { font-family: Charter, Georgia, serif; font-size: 1.15rem; margin: 0; }
.sub { color: var(--muted); font-size: 0.8rem; }
#buscar {

  border-radius: 6px; padding: 5px 10px; font-size: 0.82rem; width: 230px;
}
#buscar:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
.leyenda { display: flex; gap: 14px; flex-wrap: wrap; font-size: 0.78rem; color: var(--muted); align-items: center; }
.leyenda .sw { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; vertical-align: -1px; }
#lienzo { display: block; width: 100vw; cursor: grab; touch-action: none; }
#lienzo.arrastrando { cursor: grabbing; }
#tarjeta {
  position: fixed; left: 14px; bottom: 14px; max-width: 340px; z-index: 5;
  background: var(--surface); border: 1px solid var(--line); border-radius: 10px;
  padding: 13px 15px; font-size: 0.82rem; box-shadow: 0 4px 18px rgba(0,0,0,0.12);
  display: none;
}
#tarjeta.visible { display: block; }
#tarjeta h3 { font-family: Charter, Georgia, serif; margin: 1px 0 2px; font-size: 1rem; }
#tarjeta .mid { font-family: ui-monospace, Consolas, monospace; font-size: 0.68rem; color: var(--muted); }
#tarjeta .grupo { font-size: 0.72rem; margin-bottom: 7px; }
#tarjeta p { margin: 0 0 8px; }
#tarjeta .fnt { color: var(--muted); font-size: 0.75rem; margin-bottom: 8px; }
#tarjeta .nums { color: var(--muted); font-size: 0.72rem; border-top: 1px solid var(--line); padding-top: 7px; }
#tarjeta button.cerrar {
  position: absolute; top: 6px; right: 8px; background: none; border: none;
  color: var(--muted); font-size: 1rem; cursor: pointer; padding: 2px 6px;
}
#tarjeta button.cerrar:focus-visible { outline: 2px solid var(--accent); }
#pista {
  position: fixed; pointer-events: none; z-index: 6; display: none;
  background: var(--surface); border: 1px solid var(--line); border-radius: 6px;
  padding: 4px 9px; font-size: 0.75rem; box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  max-width: 260px;
}
#controles {
  position: fixed; right: 16px; bottom: 16px; z-index: 6; display: flex; flex-direction: column; gap: 6px;
}
#controles button {
  width: 38px; height: 38px; border-radius: 9px; border: 1px solid var(--line);
  background: var(--surface); color: var(--ink); font-size: 1.15rem; cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.14); line-height: 1; display: flex; align-items: center; justify-content: center;
}
#controles button:hover { border-color: var(--accent); color: var(--accent); }
#controles button:focus-visible { outline: 2px solid var(--accent); }

": "hsl(145, 55%, 46%)", "n": 32}, {"nombre": "Física del Estado Sólido", "curso": 4, "color": "hsl(283, 55%, 46%)", "n": 41}, {"nombre": "Física Atómica", "curso": 4, "color": "hsl(60, 55%, 46%)", "n": 41}, {"nombre": "Mecánica Cuántica", "curso": 4, "color": "hsl(198, 55%, 46%)", "n": 44}, {"nombre": "Física Nuclear y de Partículas", "curso": 4, "color": "hsl(335, 55%, 46%)", "n": 26}, {"nombre": "Simetrías, Campos y Partículas", "curso": 4, "color": "hsl(113, 55%, 46%)", "n": 23}], "maxNivel": 35};

const NOMBRES_LIBROS = {
  wangsness: "Wangsness", griffiths: "Griffiths", jackson: "Jackson",
  feynman: "Feynman", panofsky: "Panofsky", thide: "Thidé",
  problemas: "Problemas", apuntes: "Apuntes UVa"
};

const nodos = DATA.nodos;
const porId = Object.fromEntries(nodos.map(n => [n.id, n]));
const aristas = [];
nodos.forEach(n => n.prereq.forEach(p => aristas.push([p.id, n.id, p.peso])));
const dependientes = {};
aristas.forEach(([a, b]) => (dependientes[a] = dependientes[a] || []).push(b));

const nPracticados = nodos.filter(n => n.dominio !== null).length;
document.getElementById("resumen").textContent =
  nodos.length + " nodos · " + aristas.length + " aristas · " +
  nPracticados + " con dominio (relleno = dominio · anillo = fluidez · hueco = sin practicar)";
document.getElementById("leyenda").innerHTML = DATA.materias.map(m =>
  "<span><span class='sw' style='background:" + m.color + "'></span>" +
  (m.curso ? m.curso + "º · " : "") + m.nombre + " (" + m.n + ")</span>").join("");

/* ---------- Disposición por fuerzas ---------- */
const ESP_Y = 95;
function azar(sem) { let s = sem; return () => (s = (s * 16807) % 2147483647) / 2147483647; }
const rnd = azar(42);
nodos.forEach(n => {
  n.x = n.anclaX + (rnd() - 0.5) * 170;
  n.y = -n.nivel * ESP_Y + (rnd() - 0.5) * 40;
  n.vx = 0; n.vy = 0;
});

function simular(iters) {
  for (let it = 0; it < iters; it++) {
    const t = 1 - it / iters;
    for (let i = 0; i < nodos.length; i++) {
      const a = nodos[i];
      for (let j = i + 1; j < nodos.length; j++) {
        const b = nodos[j];
        let dx = a.x - b.x, dy = a.y - b.y;
        let d2 = dx * dx + dy * dy;
        if (d2 < 1) { dx = rnd() - 0.5; dy = rnd() - 0.5; d2 = 1; }
        if (d2 > 90000) continue;
        const f = 1300 / d2;
        const d = Math.sqrt(d2);
        dx = dx / d * f; dy = dy / d * f;
        a.vx += dx; a.vy += dy; b.vx -= dx; b.vy -= dy;
      }
    }
    aristas.forEach(([ai, bi]) => {
      const a = porId[ai], b = porId[bi];
      const dx = b.x - a.x, dy = b.y - a.y;
      const d = Math.max(1, Math.sqrt(dx * dx + dy * dy));
      const f = (d - 65) * 0.012;
      a.vx += dx / d * f; a.vy += dy / d * f;
      b.vx -= dx / d * f; b.vy -= dy / d * f;
    });
    nodos.forEach(n => {
      n.vx += (n.anclaX - n.x) * 0.006;
      n.vy += (-n.nivel * ESP_Y - n.y) * 0.045;
      n.x += n.vx * 0.85 * t; n.y += n.vy * 0.85 * t;
      n.vx *= 0.55; n.vy *= 0.55;
    });
  }
}
simular(380);

/* ---------- Render ---------- */
const lienzo = document.getElementById("lienzo");
const ctx = lienzo.getContext("2d");
let escala = 1, tx = 0, ty = 0;
let seleccion = null, ancSel = new Set(), descSel = new Set(), coincidencias = new Set();

function css(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

function ajustarVista() {
  const xs = nodos.map(n => n.x), ys = nodos.map(n => n.y);
  const minX = Math.min(...xs) - 60, maxX = Math.max(...xs) + 60;
  const minY = Math.min(...ys) - 60, maxY = Math.max(...ys) + 60;
  const w = lienzo.clientWidth, h = lienzo.clientHeight;
  escala = Math.min(w / (maxX - minX), h / (maxY - minY));
  tx = w / 2 - escala * (minX + maxX) / 2;
  ty = h / 2 - escala * (minY + maxY) / 2;
}

function dims() {
  const dpr = window.devicePixelRatio || 1;
  const alto = Math.max(420, window.innerHeight - lienzo.getBoundingClientRect().top - 4);
  lienzo.style.height = alto + "px";
  lienzo.width = lienzo.clientWidth * dpr;
  lienzo.height = alto * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function ancestros(id) {
  const res = new Set(), cola = [id];
  while (cola.length) {
    (porId[cola.pop()].prereq || []).forEach(p => {
      if (porId[p.id] && !res.has(p.id)) { res.add(p.id); cola.push(p.id); }
    });
  }
  return res;
}
function descendientes(id) {
  const res = new Set(), cola = [id];
  while (cola.length) {
    (dependientes[cola.pop()] || []).forEach(d => {
      if (!res.has(d)) { res.add(d); cola.push(d); }
    });
  }
  return res;
}

function dibujar() {
  const w = lienzo.clientWidth, h = lienzo.clientHeight;
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = css("--bg");
  ctx.fillRect(0, 0, w, h);

  const X = n => n.x * escala + tx, Y = n => n.y * escala + ty;
  const haySel = seleccion !== null;

  aristas.forEach(([ai, bi]) => {
    const a = porId[ai], b = porId[bi];
    let color = css("--edge"), grosor = 1;
    if (haySel) {
      const enCadenaAsc = (bi === seleccion || ancSel.has(bi)) && (ancSel.has(ai));
      const directoAsc = bi === seleccion && ancSel.has(ai);
      const enCadenaDesc = (ai === seleccion || descSel.has(ai)) && descSel.has(bi);
      if (directoAsc || enCadenaAsc) { color = css("--accent"); grosor = directoAsc ? 1.8 : 1.1; }
      else if (enCadenaDesc) { color = css("--copper"); grosor = 1.1; }
      else color = css("--edge-dim");
    }
    ctx.strokeStyle = color; ctx.lineWidth = grosor;
    ctx.beginPath(); ctx.moveTo(X(a), Y(a)); ctx.lineTo(X(b), Y(b)); ctx.stroke();
  });

  nodos.forEach(n => {
    const x = X(n), y = Y(n);
    let r = 6, alfa = 1;
    if (haySel) {
      if (n.id === seleccion) r = 10;
      else if (ancSel.has(n.id) || descSel.has(n.id)) r = 7.5;
      else alfa = 0.2;
    }
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2);
    if (n.dominio === null) {
      // Sin practicar: nodo hueco
      ctx.globalAlpha = alfa;
      ctx.fillStyle = css("--bg"); ctx.fill();
      ctx.lineWidth = 1.4; ctx.strokeStyle = n.color; ctx.stroke();
    } else {
      // Relleno proporcional al dominio (estilo Math Academy)
      ctx.globalAlpha = alfa * (0.3 + 0.7 * n.dominio);
      ctx.fillStyle = n.color; ctx.fill();
      ctx.globalAlpha = alfa;
      ctx.lineWidth = 1; ctx.strokeStyle = n.color; ctx.stroke();
    }
    // Anillo de fluidez (soltura/velocidad): medidor proporcional alrededor del nodo
    if (n.fluidez !== null && n.fluidez !== undefined) {
      ctx.globalAlpha = alfa;
      ctx.lineWidth = 2;
      ctx.strokeStyle = n.fluidez >= 0.7 ? "#34d399" : "#fbbf24";
      ctx.beginPath();
      ctx.arc(x, y, r + 2.6, -Math.PI / 2, -Math.PI / 2 + n.fluidez * Math.PI * 2);
      ctx.stroke();
    }
    if (n.id === seleccion) { ctx.globalAlpha = 1; ctx.lineWidth = 2.4; ctx.strokeStyle = css("--ink"); ctx.stroke(); }
    if (coincidencias.has(n.id)) {
      ctx.lineWidth = 2; ctx.strokeStyle = css("--copper");
      ctx.beginPath(); ctx.arc(x, y, r + 3.4, 0, Math.PI * 2); ctx.stroke();
    }
    ctx.globalAlpha = 1;
  });

  // Etiquetas legibles al acercar (o para la cadena del nodo seleccionado).
  const mostrarTodas = escala > 1.15;
  if (mostrarTodas || haySel || coincidencias.size) {
    ctx.font = "600 11px system-ui, 'Segoe UI', sans-serif";
    ctx.textBaseline = "middle";
    nodos.forEach(n => {
      const x = X(n), y = Y(n);
      if (x < -60 || x > w + 60 || y < -20 || y > h + 20) return;
      const enCadena = haySel && (n.id === seleccion || ancSel.has(n.id) || descSel.has(n.id));
      const esCoincidencia = coincidencias.has(n.id);
      if (!mostrarTodas && !enCadena && !esCoincidencia) return;
      if (haySel && !enCadena && !esCoincidencia) return;   // al seleccionar, solo su cadena
      const etq = n.nombre.length > 30 ? n.nombre.slice(0, 29) + "…" : n.nombre;
      const rr = (n.id === seleccion) ? 10 : (enCadena ? 7.5 : 6);
      ctx.globalAlpha = 1;
      // halo para legibilidad sobre las aristas
      ctx.lineWidth = 3; ctx.strokeStyle = css("--bg");
      ctx.strokeText(etq, x + rr + 3, y);
      ctx.fillStyle = css("--ink");
      ctx.fillText(etq, x + rr + 3, y);
    });
    ctx.globalAlpha = 1;
  }
}

function nodoEn(px, py) {
  let mejor = null, mejorD = 12 * 12;
  nodos.forEach(n => {
    const dx = n.x * escala + tx - px, dy = n.y * escala + ty - py;
    const d = dx * dx + dy * dy;
    if (d < mejorD) { mejorD = d; mejor = n; }
  });
  return mejor;
}

function seleccionar(id) {
  seleccion = id;
  const tarjeta = document.getElementById("tarjeta");
  if (!id) { tarjeta.className = ""; dibujar(); return; }
  ancSel = ancestros(id); descSel = descendientes(id);
  const n = porId[id];
  const fnt = Object.entries(n.fuentes).map(([k, v]) =>
    (NOMBRES_LIBROS[k] || k) + " " + v).join(" · ");
  const dominioTxt = n.dominio === null
    ? "Sin practicar"
    : "Dominio: " + Math.round(n.dominio * 100) + "%" +
      (n.fluidez !== null && n.fluidez !== undefined ? " · fluidez: " + Math.round(n.fluidez * 100) + "%" : "") +
      (n.proxima ? " · próxima revisión: " + n.proxima : "");
  tarjeta.innerHTML =
    "<button class='cerrar' aria-label='Cerrar'>×</button>" +
    "<div class='mid'>" + n.id + " — " + dominioTxt + "</div><h3>" + n.nombre + "</h3>" +
    "<div class='grupo' style='color:" + n.color + "'>" + n.materia + " · " + n.temaNombre + "</div>" +
    "<p>" + n.descripcion + "</p>" +
    (fnt ? "<div class='fnt'>" + fnt + "</div>" : "") +
    "<div class='nums'>" + ancSel.size + " nodos en su cadena de prerrequisitos (azul) · " +
    descSel.size + " dependen de él (cobre)</div>";
  tarjeta.className = "visible";
  tarjeta.querySelector(".cerrar").addEventListener("click", () => seleccionar(null));
  dibujar();
}

/* ---------- Interacción ---------- */
let arrastrando = false, movido = false, px0 = 0, py0 = 0;
lienzo.addEventListener("pointerdown", e => {
  arrastrando = true; movido = false; px0 = e.clientX; py0 = e.clientY;
  lienzo.classList.add("arrastrando"); lienzo.setPointerCapture(e.pointerId);
});
lienzo.addEventListener("pointermove", e => {
  const pista = document.getElementById("pista");
  if (arrastrando) {
    const dx = e.clientX - px0, dy = e.clientY - py0;
    if (Math.abs(dx) + Math.abs(dy) > 3) movido = true;
    tx += dx; ty += dy; px0 = e.clientX; py0 = e.clientY;
    pista.style.display = "none";
    dibujar();
    return;
  }
  const r = lienzo.getBoundingClientRect();
  const n = nodoEn(e.clientX - r.left, e.clientY - r.top);
  if (n) {
    pista.textContent = n.nombre;
    pista.style.display = "block";
    pista.style.left = (e.clientX + 14) + "px";
    pista.style.top = (e.clientY + 10) + "px";
    lienzo.style.cursor = "pointer";
  } else {
    pista.style.display = "none";
    lienzo.style.cursor = "grab";
  }
});
lienzo.addEventListener("pointerup", e => {
  arrastrando = false; lienzo.classList.remove("arrastrando");
  if (movido) return;
  const r = lienzo.getBoundingClientRect();
  const n = nodoEn(e.clientX - r.left, e.clientY - r.top);
  seleccionar(n ? n.id : null);
});
lienzo.addEventListener("wheel", e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.13 : 1 / 1.13;
  const r = lienzo.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  tx = mx - (mx - tx) * factor; ty = my - (my - ty) * factor;
  escala *= factor;
  dibujar();
}, { passive: false });

document.getElementById("buscar").addEventListener("input", e => {
  const q = e.target.value.trim().toLowerCase();
  coincidencias = new Set();
  if (q) nodos.forEach(n => {
    if ((n.id + " " + n.nombre).toLowerCase().includes(q)) coincidencias.add(n.id);
  });
  dibujar();
});
document.getElementById("buscar").addEventListener("keydown", e => {
  if (e.key === "Enter" && coincidencias.size) seleccionar([...coincidencias][0]);
});

/* ---------- Controles de zoom ---------- */
function zoomCentro(factor) {
  const w = lienzo.clientWidth, h = lienzo.clientHeight;
  const mx = w / 2, my = h / 2;
  tx = mx - (mx - tx) * factor; ty = my - (my - ty) * factor;
  escala *= factor; dibujar();
}
document.getElementById("z-in").addEventListener("click", () => zoomCentro(1.25));
document.getElementById("z-out").addEventListener("click", () => zoomCentro(1 / 1.25));
document.getElementById("z-fit").addEventListener("click", () => { ajustarVista(); zoomCentro(1); });

window.addEventListener("resize", () => { dims(); ajustarVista(); dibujar(); });
matchMedia("(prefers-color-scheme: dark)").addEventListener("change", dibujar);
new MutationObserver(dibujar).observe(document.documentElement, { attributes: true, attributeFilter: ["data-theme"] });

dims(); ajustarVista(); dibujar();
// Reajuste tras el primer layout real (útil dentro de un iframe / al entrar en pantalla completa)
requestAnimationFrame(() => { dims(); ajustarVista(); dibujar(); });
</script>
