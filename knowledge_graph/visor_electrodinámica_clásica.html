<title>Grafo Electrodinámica Clásica UVa</title>
<style>
:root {
  --bg: #F7F9FB;
  --surface: #FFFFFF;
  --ink: #1C2733;
  --muted: #5B6B7A;
  --line: #D8E0E8;
  --accent: #1D5FC2;
  --accent-ink: #FFFFFF;
  --accent-soft: rgba(29, 95, 194, 0.10);
  --copper: #B4690E;
  --copper-soft: rgba(180, 105, 14, 0.12);
  --sel: #12345E;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0E141B;
    --surface: #16202B;
    --ink: #E2E9F0;
    --muted: #8FA1B3;
    --line: #26323F;
    --accent: #6FA5F2;
    --accent-ink: #0E141B;
    --accent-soft: rgba(111, 165, 242, 0.14);
    --copper: #E39A4E;
    --copper-soft: rgba(227, 154, 78, 0.14);
    --sel: #BDD7FF;
  }
}
:root[data-theme="light"] {
  --bg: #F7F9FB; --surface: #FFFFFF; --ink: #1C2733; --muted: #5B6B7A;
  --line: #D8E0E8; --accent: #1D5FC2; --accent-ink: #FFFFFF;
  --accent-soft: rgba(29, 95, 194, 0.10); --copper: #B4690E;
  --copper-soft: rgba(180, 105, 14, 0.12); --sel: #12345E;
}
:root[data-theme="dark"] {
  --bg: #0E141B; --surface: #16202B; --ink: #E2E9F0; --muted: #8FA1B3;
  --line: #26323F; --accent: #6FA5F2; --accent-ink: #0E141B;
  --accent-soft: rgba(111, 165, 242, 0.14); --copper: #E39A4E;
  --copper-soft: rgba(227, 154, 78, 0.14); --sel: #BDD7FF;
}
* { box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: system-ui, "Segoe UI", sans-serif;
  margin: 0;
  line-height: 1.45;
}
.wrap { max-width: 1240px; margin: 0 auto; padding: 28px 20px 80px; }
header.top { margin-bottom: 20px; }
h1 {
  font-family: Charter, Georgia, "Times New Roman", serif;
  font-size: 1.7rem;
  font-weight: 700;
  margin: 0 0 4px;
  text-wrap: balance;
}
.sub { color: var(--muted); font-size: 0.92rem; margin: 0; }
.toolbar {
  display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
  margin-top: 16px;
}
#buscar {
  background: var(--surface); color: var(--ink);
  border: 1px solid var(--line); border-radius: 6px;
  padding: 8px 12px; font-size: 0.9rem; width: 260px; max-width: 100%;
}
#buscar:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
.leyenda { display: flex; flex-wrap: wrap; gap: 14px; font-size: 0.8rem; color: var(--muted); }
.leyenda span { display: inline-flex; align-items: center; gap: 6px; }
.dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
.dot.d-sel { background: var(--accent); }
.dot.d-pre { background: transparent; border: 2px solid var(--accent); }
.dot.d-anc { background: var(--accent-soft); border: 1px solid var(--accent); }
.dot.d-dep { background: transparent; border: 2px solid var(--copper); }

.cols { display: grid; grid-template-columns: 1fr 340px; gap: 24px; align-items: start; }
@media (max-width: 900px) { .cols { grid-template-columns: 1fr; } .panel { position: static !important; } }

section.tema { margin-bottom: 18px; }
.tema h2 {
  font-family: Charter, Georgia, serif;
  font-size: 1.02rem; font-weight: 700; margin: 0 0 8px;
  padding-bottom: 4px; border-bottom: 1px solid var(--line);
}
.tema h2 small { color: var(--muted); font-weight: 400; font-size: 0.8rem; margin-left: 8px; }
.pills { display: flex; flex-wrap: wrap; gap: 7px; }
button.pill {
  background: var(--surface); color: var(--ink);
  border: 1px solid var(--line); border-radius: 999px;
  padding: 5px 12px; font-size: 0.82rem; cursor: pointer;
  font-family: inherit; line-height: 1.3;
  transition: border-color 120ms, background 120ms, opacity 120ms;
}
@media (prefers-reduced-motion: reduce) { button.pill { transition: none; } }
button.pill .nid {
  font-family: ui-monospace, Consolas, monospace;
  font-size: 0.68rem; color: var(--muted); margin-right: 6px;
}
button.pill:hover { border-color: var(--accent); }
button.pill:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
button.pill.sel { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); }
button.pill.sel .nid { color: var(--accent-ink); opacity: 0.75; }
button.pill.pre { border: 2px solid var(--accent); background: var(--accent-soft); }
button.pill.pre.blanda { border-style: dashed; }
button.pill.anc { background: var(--accent-soft); }
button.pill.dep { border: 2px solid var(--copper); background: var(--copper-soft); }
button.pill.apagado { opacity: 0.28; }

.panel {
  position: sticky; top: 16px;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: 10px; padding: 18px 18px 20px;
}
.panel .vacio { color: var(--muted); font-size: 0.9rem; }
.panel h3 {
  font-family: Charter, Georgia, serif;
  font-size: 1.15rem; margin: 2px 0 2px; text-wrap: balance;
}
.panel .meta {
  font-family: ui-monospace, Consolas, monospace;
  font-size: 0.72rem; color: var(--muted);
}
.panel .temaLbl { font-size: 0.78rem; color: var(--accent); margin: 4px 0 10px; }
.panel p.desc { font-size: 0.88rem; margin: 0 0 14px; }
.panel h4 {
  font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--muted); margin: 14px 0 6px; font-weight: 600;
}
.chips { display: flex; flex-wrap: wrap; gap: 6px; }
button.chip {
  background: none; border: 1px solid var(--line); border-radius: 6px;
  color: var(--ink); font-size: 0.78rem; padding: 3px 9px; cursor: pointer;
  font-family: inherit; text-align: left;
}
button.chip:hover, button.chip:focus-visible { border-color: var(--accent); outline: none; }
button.chip .peso { color: var(--muted); font-size: 0.7rem; }
.chip.cPre { border-left: 3px solid var(--accent); }
.chip.cDep { border-left: 3px solid var(--copper); }
ul.fuentes { margin: 0; padding: 0 0 0 2px; list-style: none; font-size: 0.82rem; }
ul.fuentes li { margin-bottom: 3px; }
ul.fuentes .libro { color: var(--muted); }
.stats { font-size: 0.78rem; color: var(--muted); margin-top: 14px; border-top: 1px solid var(--line); padding-top: 10px; }
</style>

<div class="wrap">
  <header class="top">
    <h1>Electrodinámica Clásica · grafo de conocimiento</h1>
    <p class="sub" id="resumen"></p>
    <div class="toolbar">
      <input id="buscar" type="search" placeholder="Filtrar nodos… (ej. Gauss, dieléctrico)" aria-label="Filtrar nodos">
      <div class="leyenda">
        <span><span class="dot d-sel"></span> seleccionado</span>

        <span><span class="dot d-anc"></span> ancestro</span>

  <div class="cols">
    <main id="temas"></main>
    <aside class="panel" id="panel">
      <p class="vacio">Haz clic en un nodo para ver sus prerrequisitos, qué temas dependen de él y dónde estudiarlo en la bibliografía.</p>
    </aside>
  </div>
</div>

<script>
const GRAFO = {"esquema_version": 1, "materia": "Electrodinámica Clásica", "codigo_uva": "45769", "temas": {"1": "Bloque 1: Ecuaciones del campo electromagnético", "2": "Bloque 2: Leyes de conservación", "3": "Bloque 3: Formulación covariante", "4": "Bloque 4: La ecuación de ondas", "5": "Bloque 5: Desarrollo multipolar de la radiación", "6": "Bloque 6: Radiación de partículas cargadas", "7": "Bloque 7: Dinámica de partículas cargadas"}, "nodos": [{"id": "ed.1.01", "tema": 1, "nombre": "Leyes generales del electromagnetismo", "descripcion": "Repaso sistemático de las ecuaciones de Maxwell micro/macroscópicas y sus condiciones de frontera.", "prerequisitos": [{"id": "em.10.01", "peso": 1.0}, {"id": "em.10.02", "peso": 0.5}], "fuentes": {"jackson": "6.3, 6.10", "panofsky": "cap. 9", "thide": "1.3"}}, {"id": "ed.1.02", "tema": 1, "nombre": "Campos y potenciales", "descripcion": "Potenciales electromagnéticos como variables fundamentales; ecuaciones acopladas para V y A.", "prerequisitos": [{"id": "ed.1.01", "peso": 1.0}, {"id": "em.10.03", "peso": 1.0}], "fuentes": {"jackson": "6.4", "thide": "3.3", "griffiths": "10.1.1"}}, {"id": "ed.1.03", "tema": 1, "nombre": "Transformaciones gauge: el gauge de Lorenz", "descripcion": "Libertad gauge, gauges de Lorenz y Coulomb, desacoplo de las ecuaciones de los potenciales.", "prerequisitos": [{"id": "ed.1.02", "peso": 1.0}], "fuentes": {"jackson": "6.5", "griffiths": "10.1.2, 10.1.3", "thide": "3.3.1 a 3.3.3"}}, {"id": "ed.2.01", "tema": 2, "nombre": "Conservación de la energía: teorema de Poynting", "descripcion": "Balance local de energía campo-materia, vector de Poynting, ejemplos no triviales.", "prerequisitos": [{"id": "ed.1.01", "peso": 1.0}, {"id": "em.10.04", "peso": 1.0}], "fuentes": {"jackson": "6.8", "thide": "6.3.1", "panofsky": "10-5"}}, {"id": "ed.2.02", "tema": 2, "nombre": "Conservación del momento: tensor de tensiones de Maxwell", "descripcion": "Momento electromagnético, tensor de Maxwell, balance de fuerzas sobre distribuciones.", "prerequisitos": [{"id": "ed.2.01", "peso": 1.0}, {"id": "em.10.05", "peso": 1.0}], "fuentes": {"jackson": "6.9", "griffiths": "8.2", "panofsky": "10-6", "thide": "6.3.2"}}, {"id": "ed.3.01", "tema": 3, "nombre": "Postulados y transformaciones de Lorentz", "descripcion": "Base experimental, postulados de Einstein, transformación de Lorentz, contracción y dilatación.", "prerequisitos": [], "fuentes": {"wangsness": "28-1, 28-2", "jackson": "11.1 a 11.4", "griffiths": "12.1", "panofsky": "cap. 15, 16"}}, {"id": "ed.3.02", "tema": 3, "nombre": "Cuadrivectores y tensores", "descripcion": "Espacio de Minkowski, métrica, cuadrivectores co/contravariantes, álgebra tensorial.", "prerequisitos": [{"id": "ed.3.01", "peso": 1.0}], "fuentes": {"jackson": "11.7, 11.8", "wangsness": "28-3", "panofsky": "17-1, 17-2", "thide": "4.1.2, 4.1.3"}}, {"id": "ed.3.03", "tema": 3, "nombre": "Mecánica relativista de partículas", "descripcion": "Tiempo propio, cuadrivelocidad, cuadrimomento, energía-momento, fuerza de Minkowski.", "prerequisitos": [{"id": "ed.3.02", "peso": 1.0}], "fuentes": {"jackson": "12.1", "griffiths": "12.2", "panofsky": "17-3 a 17-5", "thide": "4.2"}}, {"id": "ed.3.04", "tema": 3, "nombre": "Transformación de las fuentes: cuadricorriente y cuadripotencial", "descripcion": "J^μ y A^μ, ecuación de continuidad y gauge de Lorenz en forma covariante.", "prerequisitos": [{"id": "ed.3.02", "peso": 1.0}, {"id": "ed.1.03", "peso": 1.0}], "fuentes": {"panofsky": "18-1", "thide": "4.3.1", "feynman": "II-25"}}, {"id": "ed.3.05", "tema": 3, "nombre": "El tensor campo electromagnético", "descripcion": "F^μν, transformación de E y B entre sistemas de referencia, invariantes del campo.", "prerequisitos": [{"id": "ed.3.04", "peso": 1.0}], "fuentes": {"jackson": "11.9, 11.10", "griffiths": "12.3.2, 12.3.3", "panofsky": "18-2, 18-6", "wangsness": "28-5"}}, {"id": "ed.3.06", "tema": 3, "nombre": "Electrodinámica en forma covariante", "descripcion": "Ecuaciones de Maxwell con F^μν, fuerza de Lorentz covariante, covariancia de las leyes de conservación.", "prerequisitos": [{"id": "ed.3.05", "peso": 1.0}, {"id": "ed.3.03", "peso": 1.0}], "fuentes": {"jackson": "11.9, 11.11", "griffiths": "12.3.4, 12.3.5", "panofsky": "18-3"}}, {"id": "ed.4.01", "tema": 4, "nombre": "Ecuación de ondas no homogénea: potenciales retardados", "descripcion": "Función de Green de la ecuación de ondas, causalidad, potenciales retardados.", "prerequisitos": [{"id": "ed.1.03", "peso": 1.0}, {"id": "em.10.06", "peso": 1.0}], "fuentes": {"jackson": "6.6", "griffiths": "10.2", "panofsky": "14-1, 14-2", "wangsness": "27-1"}}, {"id": "ed.4.02", "tema": 4, "nombre": "Potenciales de Liénard-Wiechert", "descripcion": "Potenciales de una carga puntual en movimiento arbitrario; tiempo retardado.", "prerequisitos": [{"id": "ed.4.01", "peso": 1.0}, {"id": "ed.3.03", "peso": 0.5}], "fuentes": {"jackson": "14.1", "griffiths": "10.3", "panofsky": "19-1", "thide": "4.3.2"}}, {"id": "ed.4.03", "tema": 4, "nombre": "Ecuación homogénea: campos armónicos", "descripcion": "Soluciones armónicas, ecuación de Helmholtz, representación espectral.", "prerequisitos": [{"id": "em.10.07", "peso": 1.0}, {"id": "ed.4.01", "peso": 0.5}], "fuentes": {"thide": "cap. 2", "jackson": "cap. 7"}}, {"id": "ed.4.04", "tema": 4, "nombre": "Campos en una guía de ondas", "descripcion": "Separación de variables, modos TE/TM, frecuencia de corte, guía rectangular.", "prerequisitos": [{"id": "ed.4.03", "peso": 1.0}, {"id": "em.10.09", "peso": 1.0}, {"id": "em.4.04", "peso": 0.5}], "fuentes": {"jackson": "8.2 a 8.4", "wangsness": "26-2 a 26-4", "griffiths": "9.5", "panofsky": "13-6"}}, {"id": "ed.4.05", "tema": 4, "nombre": "Cavidades resonantes", "descripcion": "Modos propios, frecuencias de resonancia, factor de calidad.", "prerequisitos": [{"id": "ed.4.04", "peso": 1.0}], "fuentes": {"jackson": "8.6, 8.7", "wangsness": "26-6", "panofsky": "13-3 a 13-5", "feynman": "II-23"}}, {"id": "ed.5.01", "tema": 5, "nombre": "Campos de una fuente localizada oscilante", "descripcion": "Zonas cercana, intermedia y de radiación; campos de radiación.", "prerequisitos": [{"id": "ed.4.01", "peso": 1.0}, {"id": "ed.4.03", "peso": 1.0}], "fuentes": {"jackson": "9.1", "panofsky": "14-3", "thide": "cap. 7"}}, {"id": "ed.5.02", "tema": 5, "nombre": "Radiación dipolar eléctrica", "descripcion": "Aproximación de primer orden, patrón de radiación, potencia radiada.", "prerequisitos": [{"id": "ed.5.01", "peso": 1.0}, {"id": "em.1.12", "peso": 0.5}], "fuentes": {"jackson": "9.2", "griffiths": "11.1.2", "thide": "8.2.2", "panofsky": "14-7"}}, {"id": "ed.5.03", "tema": 5, "nombre": "Radiación dipolar magnética y cuadrupolar", "descripcion": "Aproximación de segundo orden: dipolo magnético y cuadrupolo eléctrico; potencias radiadas.", "prerequisitos": [{"id": "ed.5.02", "peso": 1.0}, {"id": "em.6.09", "peso": 0.5}], "fuentes": {"jackson": "9.3", "griffiths": "11.1.3", "thide": "8.2.3, 8.2.4", "panofsky": "14-8"}}, {"id": "ed.5.04", "tema": 5, "nombre": "Antenas", "descripcion": "Antena lineal alimentada en el centro, resistencia de radiación, patrones.", "prerequisitos": [{"id": "ed.5.02", "peso": 1.0}], "fuentes": {"jackson": "9.4", "wangsness": "27-6", "thide": "8.1"}}, {"id": "ed.6.01", "tema": 6, "nombre": "Campos de una carga acelerada", "descripcion": "Campos de velocidad y de aceleración a partir de Liénard-Wiechert.", "prerequisitos": [{"id": "ed.4.02", "peso": 1.0}], "fuentes": {"jackson": "14.1", "griffiths": "10.3.2", "panofsky": "20-1"}}, {"id": "ed.6.02", "tema": 6, "nombre": "Potencia radiada: Larmor y su generalización relativista", "descripcion": "Fórmula de Larmor, generalización de Liénard, dependencia con γ.", "prerequisitos": [{"id": "ed.6.01", "peso": 1.0}, {"id": "ed.3.03", "peso": 1.0}], "fuentes": {"jackson": "14.2", "griffiths": "11.2.1", "panofsky": "20-2, 20-3"}}, {"id": "ed.6.03", "tema": 6, "nombre": "Distribución angular de la radiación", "descripcion": "Patrones angulares para aceleración paralela y perpendicular a la velocidad; colimación relativista.", "prerequisitos": [{"id": "ed.6.02", "peso": 1.0}], "fuentes": {"jackson": "14.3, 14.4", "panofsky": "20-3, 20-4", "thide": "8.3.2"}}, {"id": "ed.6.04", "tema": 6, "nombre": "Bremsstrahlung y radiación de Cherenkov", "descripcion": "Radiación de frenado en movimiento rectilíneo; radiación de cargas en medios (Cherenkov).", "prerequisitos": [{"id": "ed.6.03", "peso": 1.0}], "fuentes": {"jackson": "14.9, cap. 15", "panofsky": "20-6, 20-7", "thide": "8.3.3, 8.3.5"}}, {"id": "ed.6.05", "tema": 6, "nombre": "Radiación sincrotrónica", "descripcion": "Movimiento circular relativista: espectro y distribución angular de la radiación sincrotrón.", "prerequisitos": [{"id": "ed.6.03", "peso": 1.0}], "fuentes": {"jackson": "14.6", "panofsky": "20-4", "thide": "8.3.4"}}, {"id": "ed.6.06", "tema": 6, "nombre": "Reacción de radiación", "descripcion": "Fuerza de Abraham-Lorentz, autoenergía, límites del modelo clásico.", "prerequisitos": [{"id": "ed.6.02", "peso": 1.0}], "fuentes": {"jackson": "cap. 17", "griffiths": "11.2.2, 11.2.3", "panofsky": "cap. 21"}}, {"id": "ed.6.07", "tema": 6, "nombre": "Aceleradores y fuentes de radiación", "descripcion": "Aplicaciones: aceleradores de partículas, fuentes de luz sincrotrón, pérdidas radiativas.", "prerequisitos": [{"id": "ed.6.04", "peso": 0.5}, {"id": "ed.6.05", "peso": 0.5}], "fuentes": {"jackson": "cap. 15", "panofsky": "cap. 20"}}, {"id": "ed.7.01", "tema": 7, "nombre": "Movimiento en campos estáticos y uniformes", "descripcion": "Tratamiento relativista del movimiento en E y B uniformes; deriva E×B.", "prerequisitos": [{"id": "ed.3.06", "peso": 1.0}, {"id": "em.6.05", "peso": 1.0}], "fuentes": {"jackson": "12.7, 12.8", "panofsky": "cap. 23", "wangsness": "Ap. A"}}, {"id": "ed.7.02", "tema": 7, "nombre": "Movimiento en campos estáticos no uniformes", "descripcion": "Derivas de gradiente y curvatura, espejos magnéticos, invariantes adiabáticos.", "prerequisitos": [{"id": "ed.7.01", "peso": 1.0}], "fuentes": {"jackson": "12.9, 12.10", "panofsky": "23-4"}}, {"id": "ed.7.03", "tema": 7, "nombre": "Movimiento en campos variables con el tiempo", "descripcion": "Aceleración por campos inducidos, betatrón, calentamiento de partículas.", "prerequisitos": [{"id": "ed.7.02", "peso": 1.0}], "fuentes": {"wangsness": "A-4", "panofsky": "cap. 23"}}]};

const nodos = GRAFO.nodos;
const porId = Object.fromEntries(nodos.map(n => [n.id, n]));
const dependientes = {};
nodos.forEach(n => (n.prerequisitos || []).forEach(p => {
  (dependientes[p.id] = dependientes[p.id] || []).push(n.id);
}));

const NOMBRES_LIBROS = {
  wangsness: "Wangsness", griffiths: "Griffiths", jackson: "Jackson",
  feynman: "Feynman", panofsky: "Panofsky", thide: "Thidé",
  problemas: "Problemas (López/Núñez)", apuntes: "Apuntes UVa"
};
function nombreDe(id) {
  return porId[id] ? porId[id].nombre : id + " (otra asignatura)";
}

document.getElementById("resumen").textContent =
  nodos.length + " nodos · " +
  nodos.reduce((a, n) => a + (n.prerequisitos || []).length, 0) + " aristas de prerrequisito · " +
  Object.keys(GRAFO.temas).length + " temas · guía docente " + GRAFO.codigo_uva + " (UVa)";

const contTemas = document.getElementById("temas");
Object.keys(GRAFO.temas).sort((a, b) => +a - +b).forEach(t => {
  const sec = document.createElement("section");
  sec.className = "tema";
  const nds = nodos.filter(n => String(n.tema) === t);
  sec.innerHTML = "<h2>" + GRAFO.temas[t] + "<small>" + nds.length + " nodos</small></h2>";
  const pills = document.createElement("div");
  pills.className = "pills";
  nds.forEach(n => {
    const b = document.createElement("button");
    b.className = "pill";
    b.dataset.id = n.id;
    b.innerHTML = '<span class="nid">' + n.id.replace("em.", "") + "</span>" + n.nombre;
    b.addEventListener("click", () => seleccionar(n.id));
    pills.appendChild(b);
  });
  sec.appendChild(pills);
  contTemas.appendChild(sec);
});

function ancestros(id) {
  const res = new Set();
  const cola = [id];
  while (cola.length) {
    const actual = porId[cola.pop()];
    if (!actual) continue;
    (actual.prerequisitos || []).forEach(p => {
      if (!res.has(p.id)) { res.add(p.id); cola.push(p.id); }
    });
  }
  return res;
}

let seleccionado = null;

function seleccionar(id) {
  const n = porId[id];
  if (!n) return; // prerrequisito de otra asignatura: no está en este visor
  seleccionado = id;
  const directos = new Map((n.prerequisitos || []).map(p => [p.id, p.peso]));
  const anc = ancestros(id);
  const deps = dependientes[id] || [];

  document.querySelectorAll("button.pill").forEach(b => {
    const bid = b.dataset.id;
    b.classList.remove("sel", "pre", "anc", "dep", "blanda");
    if (bid === id) b.classList.add("sel");
    else if (directos.has(bid)) {
      b.classList.add("pre");
      if (directos.get(bid) < 1) b.classList.add("blanda");
    }
    else if (anc.has(bid)) b.classList.add("anc");
    else if (deps.includes(bid)) b.classList.add("dep");
  });

  const fuentes = Object.entries(n.fuentes || {}).map(([k, v]) =>
    "<li><span class='libro'>" + (NOMBRES_LIBROS[k] || k) + ":</span> " + v + "</li>").join("");

  const chipsPre = (n.prerequisitos || []).map(p =>
    "<button class='chip cPre' data-go='" + p.id + "'>" + nombreDe(p.id) +
    (p.peso < 1 ? " <span class='peso'>(" + p.peso + ")</span>" : "") + "</button>").join("") ||
    "<span class='vacio'>Ninguno — nodo raíz.</span>";

  const chipsDep = deps.map(d =>
    "<button class='chip cDep' data-go='" + d + "'>" + porId[d].nombre + "</button>").join("") ||
    "<span class='vacio'>Ninguno (final de rama).</span>";

  document.getElementById("panel").innerHTML =
    "<div class='meta'>" + n.id + "</div>" +
    "<h3>" + n.nombre + "</h3>" +
    "<div class='temaLbl'>" + GRAFO.temas[String(n.tema)] + "</div>" +
    "<p class='desc'>" + n.descripcion + "</p>" +
    "<h4>Prerrequisitos directos</h4><div class='chips'>" + chipsPre + "</div>" +
    "<h4>Lo necesitan</h4><div class='chips'>" + chipsDep + "</div>" +
    "<h4>Dónde estudiarlo</h4><ul class='fuentes'>" + fuentes + "</ul>" +
    "<div class='stats'>" + anc.size + " nodos en su cadena de prerrequisitos · desbloquea " +
    deps.length + " directamente</div>";

  document.querySelectorAll("#panel button.chip").forEach(c =>
    c.addEventListener("click", () => {
      seleccionar(c.dataset.go);
      const pill = document.querySelector("button.pill[data-id='" + c.dataset.go + "']");
      if (pill) pill.scrollIntoView({ block: "center", behavior: matchMedia("(prefers-reduced-motion: reduce)").matches ? "auto" : "smooth" });
    }));
}

document.getElementById("buscar").addEventListener("input", e => {
  const q = e.target.value.trim().toLowerCase();
  document.querySelectorAll("button.pill").forEach(b => {
    const n = porId[b.dataset.id];
    const texto = (n.id + " " + n.nombre + " " + n.descripcion).toLowerCase();
    b.classList.toggle("apagado", q !== "" && !texto.includes(q));
  });
});
</script>
